name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  # required for npm --provenance
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Smoke-check built bins
        shell: bash
        run: |
          node dist/cli.js version
          # The mcp bin requires a config; just verify it loads the CLI layer
          # and errors cleanly on missing config rather than crashing.
          # stdin closed so stdio server can't hang waiting for input.
          node dist/mcp.js --scope global < /dev/null || test $? -eq 3

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Prereleases (version contains a hyphen, e.g. 0.0.2-alpha.0) go
          # under the `alpha` dist-tag so `npm install <pkg>` without a tag
          # does not silently pick up an unstable version once 1.0.0 ships.
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            npm publish --provenance --access public --tag alpha
          else
            npm publish --provenance --access public
          fi

  notes:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --notes "Pinned: MCP spec 2025-11-25 · @modelcontextprotocol/sdk ^1.29"

  sea-binaries:
    # Followup #8: build Node SEA (single executable application) binaries
    # for every platform + arch combo and attach them as release assets.
    # Users who don't have Node installed can curl one file and run it.
    needs: notes
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Build dist
        run: npm run build
      - name: Build SEA binary
        shell: bash
        run: node scripts/build-sea.mjs
      - name: Smoke-check SEA binary
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            ./dist/sea/vcf-cli-win-${{ matrix.arch }}.exe version
          else
            ./dist/sea/vcf-cli-${{ matrix.platform }}-${{ matrix.arch }} version
          fi
      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            ASSET="dist/sea/vcf-cli-win-${{ matrix.arch }}.exe"
          else
            ASSET="dist/sea/vcf-cli-${{ matrix.platform }}-${{ matrix.arch }}"
          fi
          gh release upload "$TAG" "$ASSET" --clobber

  bump-brew:
    # Fire a repository_dispatch at Kaelith-Labs/homebrew-vcf so its
    # bump.yml workflow pulls the just-published tarball and updates
    # Formula/vcf-cli.rb. Needs a PAT with repo:write on homebrew-vcf
    # stored as BREW_DISPATCH_TOKEN. Step is a no-op if the secret is
    # missing — we skip rather than fail the release.
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Dispatch formula bump
        env:
          BREW_DISPATCH_TOKEN: ${{ secrets.BREW_DISPATCH_TOKEN }}
        run: |
          if [[ -z "${BREW_DISPATCH_TOKEN}" ]]; then
            echo "BREW_DISPATCH_TOKEN not set — skipping brew bump dispatch."
            exit 0
          fi
          TAG="${GITHUB_REF_NAME#v}"
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${BREW_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Kaelith-Labs/homebrew-vcf/dispatches \
            -d "{\"event_type\":\"cli-release\",\"client_payload\":{\"version\":\"${TAG}\"}}"
