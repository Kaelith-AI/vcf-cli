name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  # required for npm --provenance
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Smoke-check built bins
        shell: bash
        run: |
          node dist/cli.js version
          # The mcp bin requires a config; just verify it loads the CLI layer
          # and errors cleanly on missing config rather than crashing.
          # stdin closed so stdio server can't hang waiting for input.
          node dist/mcp.js --scope global < /dev/null || test $? -eq 3

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

  notes:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --notes "Pinned: MCP spec 2025-11-25 · @modelcontextprotocol/sdk ^1.29"
