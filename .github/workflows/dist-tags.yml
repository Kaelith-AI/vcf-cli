name: npm-dist-tags

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to tag (e.g. 0.1.0-alpha.0)"
        required: true
        type: string
      tag:
        description: "Dist-tag to point at that version (e.g. latest, alpha, next)"
        required: true
        type: string
        default: latest

permissions:
  contents: read

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Move dist-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm dist-tag add "@kaelith-labs/cli@${{ inputs.version }}" "${{ inputs.tag }}"
          echo "Current dist-tags:"
          npm dist-tag ls @kaelith-labs/cli
