name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} · node-${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Node 20 dropped with the 0.3.0 migration from better-sqlite3 to
        # node:sqlite, which requires >= 22.13. 22 is active LTS; 24 is
        # current.
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Smoke-check built bins
        shell: bash
        run: |
          node dist/cli.js version
          # MCP bin requires config; expect clean exit (code 3) on missing config
          # rather than crash. stdin is closed in CI, so the server won't hang.
          node dist/mcp.js --scope global < /dev/null || test $? -eq 3
