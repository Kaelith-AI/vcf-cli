name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} · node-${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest dropped until npm optional-deps rollup bug is resolved
        # (https://github.com/npm/cli/issues/4828). Covers darwin-arm64 only;
        # production install via npm on Mac is unaffected.
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install deps
        # Use `npm install` rather than `npm ci` to sidestep the cross-platform
        # optional-dep resolution bug in npm (npm/cli#4828). Strict lockfile
        # behaviour is restored in the release workflow which only runs on ubuntu.
        run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Smoke-check built bins
        shell: bash
        run: |
          node dist/cli.js version
          # MCP bin requires config; expect clean exit (code 3) on missing config
          # rather than crash. stdin is closed in CI, so the server won't hang.
          node dist/mcp.js --scope global < /dev/null || test $? -eq 3
